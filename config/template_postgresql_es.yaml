# ================== PostgreSQL 导出配置 ==================
export:
  output: ./exports/pg_assets_export.sql

# ================== ES 导出配置 ==================
es_export:
  output_dir: ./exports/es_latest/
  size_per_batch: 1000

# ================== ES 索引配置【可选】 ==================
es_indices:
  asset: xdr_asset
  fingerprint: xdr_asset_fingerprint
  asset_his: xdr_asset_his
  alarm_pattern: maxs_alarm_
  event_pattern: maxs_event_
  
  # 要导出的月份索引【必填】（格式：YYYYMM）
  index_cycles: [202605, 202604, 202603]

# ================== 数据验证配置 ==================
verify:
  enabled: true

# ============================================================
# 使用示例：
# ============================================================
# 1. PostgreSQL + ES 一键迁移：
#    aixdr-exporter export-import --config my_config.yaml
#
# 2. 仅迁移 PostgreSQL 数据：
#    aixdr-exporter export-import --config my_config.yaml --source postgresql --target postgresql
#
# 3. 仅迁移 ES 数据：
#    aixdr-exporter export-import --config my_config.yaml --source es --target es
#
# 4. 分步执行：
#    aixdr-exporter export --config my_config.yaml --source postgresql
#    aixdr-exporter import --config my_config.yaml --target postgresql
# ============================================================