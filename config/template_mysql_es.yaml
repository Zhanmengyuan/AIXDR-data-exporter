# ================== MySQL 导出配置 ==================
export:
  # MySQL 数据导出文件路径【可选】（默认 ./exports/assets_export.sql）
  output: ./exports/assets_export.sql

# ================== ES 导出配置 ==================
es_export:
  # ES 数据导出目录【可选】（默认 ./exports/es_latest/）
  output_dir: ./exports/es_latest/
  # 每批次导出数量【可选】（默认 1000）
  size_per_batch: 1000

# ================== ES 索引配置【可选】 ==================
es_indices:
  asset: xdr_asset
  # 资产指纹索引名【可选】（默认 xdr_asset_fingerprint）
  fingerprint: xdr_asset_fingerprint
  # 资产历史索引名【可选】（默认 xdr_asset_his）
  asset_his: xdr_asset_his
  # 告警索引前缀【可选】（默认 maxs_alarm_）
  alarm_pattern: maxs_alarm_
  # 事件索引前缀【可选】（默认 maxs_event_）
  event_pattern: maxs_event_
  #导出 2026年5月、4月、3月的告警和事件数据
  index_cycles: [202607, 202606, 202605, 202604]

# ================== 数据验证配置 ==================
verify:
  # 导入后是否验证数据完整性【可选】（默认 true）
  enabled: true

# ============================================================
# 使用示例：
# ============================================================
# 1. MySQL + ES 一键迁移：
#    aixdr-exporter export-import --config my_config.yaml
#
# 2. 仅迁移 MySQL 数据：
#    aixdr-exporter export-import --config my_config.yaml --source mysql --target mysql
#
# 3. 仅迁移 ES 数据：
#    aixdr-exporter export-import --config my_config.yaml --source es --target es
#
# 4. 分步执行：
#    aixdr-exporter export --config my_config.yaml
#    aixdr-exporter import --config my_config.yaml
# ============================================================